rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration registers no custom service actions in v0.1.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration registers no custom service actions in v0.1.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: No custom service actions registered.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: No options flow in v0.1.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery: done
  discovery-update-info: done
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Each config entry corresponds to exactly one heat pump.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues: done
  stale-devices:
    status: exempt
    comment: Each config entry corresponds to exactly one heat pump.

  # Platinum
  async-dependency: done
  inject-websession:
    status: exempt
    comment: |
      The Tuya v3.3 local protocol is a raw TCP stream over port 6668, not HTTP,
      so an `aiohttp.ClientSession` is categorically irrelevant — there is no
      websession to inject. The persistent socket carries per-frame AES-128-ECB
      cipher state keyed on the device's `local_key` plus a monotonic sequence
      counter; that state is device-scoped and cannot be shared across
      integrations. The heartbeat loop, reader task, and reconnect-with-backoff
      machinery are all bound to that single socket, so there is no separable
      session lifecycle that Home Assistant could own on our behalf.
  strict-typing: done
