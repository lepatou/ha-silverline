name: Tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pysilverline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pysilverline
        working-directory: pysilverline
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run pysilverline tests
        working-directory: pysilverline
        run: pytest tests/ -q

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ./pysilverline
          pip install pytest pytest-asyncio pytest-cov pytest-homeassistant-custom-component syrupy
      - name: Run integration tests with coverage
        run: |
          pytest tests/ \
            --cov=custom_components.poolex_silverline \
            --cov-report=term-missing \
            --cov-fail-under=90
