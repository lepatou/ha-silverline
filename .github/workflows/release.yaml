name: Release
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.8.2)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: |
          ref="${{ github.event.inputs.tag || github.ref }}"
          tag="${ref#refs/tags/}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Sync manifest version with tag
        run: |
          python -c "
          import json, pathlib
          path = pathlib.Path('custom_components/poolex_silverline/manifest.json')
          data = json.loads(path.read_text())
          data['version'] = '${{ steps.version.outputs.version }}'
          path.write_text(json.dumps(data, indent=2) + '\n')
          "

      - name: Build release zip
        run: |
          cd custom_components/poolex_silverline
          zip -r "$GITHUB_WORKSPACE/poolex_silverline.zip" .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: poolex_silverline.zip
          generate_release_notes: true
